name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This step copies your code from GitHub to the EC2 server
      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/app"

      # This step builds and runs the container on the server
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Docker if not present (Ubuntu way)
            if ! [ -x "$(command -v docker)" ]; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo usermod -aG docker ubuntu
            fi
            
            cd /home/ubuntu/app
            
            # Stop and remove old container if it exists
            sudo docker stop flask-app || true
            sudo docker rm flask-app || true
            
            # Build the image from the local Dockerfile
            sudo docker build -t flask-app .
            
            # Run the new container
            sudo docker run -d -p 80:5000 --name flask-app flask-app
